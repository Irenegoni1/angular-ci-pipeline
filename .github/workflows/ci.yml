name: CI Pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout repository
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v3

      # -------------------------
      # Backend: Authorization Server
      # -------------------------
      - name: Build Authorization Server
        working-directory: ./authorization-server
        run: mvn -q -DskipTests clean package

      # -------------------------
      # Backend: Resource Server
      # -------------------------
      - name: Build Resource Server
        working-directory: ./resource-server
        run: mvn -q -DskipTests clean package

      # -------------------------
      # Frontend: Saltarse Angular si no existe
      # -------------------------
      - name: Build Angular (si existe)
        run: |
          if [ -f "./ag-prueba-front/package.json" ]; then
            echo "Angular frontend detected. Installing dependencies..."
            cd ag-prueba-front
            npm install
            npm run build --if-present
          else
            echo "No Angular frontend found. Skip step."
          fi

      # -------------------------
      # Deploy simulado
      # -------------------------
      - name: Deploy placeholder
        run: |
          echo "Pipeline mínimo ejecutado. Deploy simulado para demostrar OKR."
