name: CI Pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Simular build backend
        run: echo "Build backend simulado"

      - name: Simular build frontend
        run: |
          if [ -f "./ag-prueba-front/package.json" ]; then
            echo "Build frontend simulado"
          else
            echo "No frontend. Skip step."
          fi

      - name: Install Angular dependencies
        working-directory: ./ag-prueba-front
        run: |
          npm install
          # Verificar que eslint está instalado
          npm list eslint || npm install eslint --no-save

      - name: Run Lint - Multiple methods
        working-directory: ./ag-prueba-front
        run: |
          echo "Attempting to run ESLint with different methods..."
          
          # Método 1: Usar npx (más confiable)
          if npx eslint . --ext .ts,.html --quiet 2>/dev/null; then
            echo "✅ ESLint passed using npx"
            exit 0
          fi
          
          # Método 2: Ruta directa con permisos
          if [ -f "./node_modules/.bin/eslint" ]; then
            chmod +x ./node_modules/.bin/eslint
            ./node_modules/.bin/eslint . --ext .ts,.html --quiet && echo "✅ ESLint passed using direct path" && exit 0
          fi
          
          # Método 3: Instalación global
          npm install -g eslint
          eslint . --ext .ts,.html --quiet && echo "✅ ESLint passed using global" && exit 0
          
          echo "❌ All ESLint methods failed"
          exit 1

      - name: Deploy simulado
        run: echo "Deploy simulado completado"