name: CI Pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ag-prueba-front/package-lock.json

      - name: Simular build backend
        run: echo "Build backend simulado"

      - name: Simular build frontend
        run: |
          if [ -f "./ag-prueba-front/package.json" ]; then
            echo "Build frontend simulado"
          else
            echo "No frontend. Skip step."
          fi

      - name: Install Angular dependencies
        working-directory: ./ag-prueba-front
        run: npm ci --no-audit --no-fund

      - name: Run Lint with npx
        working-directory: ./ag-prueba-front
        run: |
          # Usar npx para evitar problemas de permisos
          npx eslint . --ext .ts,.html --quiet
          echo "✅ ESLint passed - code quality verified for OKR 3"

      - name: Deploy simulado
        run: echo "Deploy simulado completado"