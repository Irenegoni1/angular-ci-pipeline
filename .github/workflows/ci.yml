name: CI Pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Backend
      - name: Backend - Build & Test
        run: |
          cd authorization-server
          mvn clean test

      # Resource server
      - name: Resource Server - Build & Test
        run: |
          cd resource-server
          mvn clean test

      # Frontend
      - name: Frontend - Test
        run: |
          cd ag-prueba-front
          npm install
          npm test -- --watch=false
