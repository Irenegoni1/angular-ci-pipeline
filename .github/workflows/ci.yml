name: CI Pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout repository
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v3

      # -------------------------
      # Backend: Authorization Server
      # -------------------------
      - name: Build Authorization Server
        working-directory: ./authorization-server
        run: mvn -q -DskipTests clean package

      # -------------------------
      # Backend: Resource Server
      # -------------------------
      - name: Build Resource Server
        working-directory: ./resource-server
        run: mvn -q -DskipTests clean package

      # -------------------------
      # Frontend: Angular
      # -------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Angular dependencies
        working-directory: ./ag-prueba-front
        run: npm install

      - name: Build Angular app
        working-directory: ./ag-prueba-front
        run: npm run build --if-present

      # -------------------------
      # Deploy (demostración OKR)
      # -------------------------
      - name: Deploy placeholder
        run: |
          echo "Despliegue simulado para medir tiempo y demostrar pipeline."
