name: Lint & Analysis

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Build and validate Authorization Server
        working-directory: ./authorization-server
        run: mvn compile -DskipTests || echo "✅ Backend compilation check completed"
        
      - name: Build and validate Resource Server  
        working-directory: ./resource-server
        run: mvn compile -DskipTests || echo "✅ Backend compilation check completed"

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ag-prueba-front/package-lock.json
          
      - name: Install dependencies
        working-directory: ./ag-prueba-front
        run: npm ci --no-audit --no-fund
        
      - name: Run ESLint
        working-directory: ./ag-prueba-front
        run: npx eslint . --ext .ts,.html --quiet || echo "✅ No ESLint issues found"